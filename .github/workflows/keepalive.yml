name: Keep Scheduled Workflows Alive

on:
  schedule:
    # Monthly activity prevents scheduled workflows from being disabled
    # after 60 days of repository inactivity.
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update keepalive marker
        run: date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/keepalive.txt

      - name: Commit keepalive marker
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive.txt
          git commit -m "chore: keep scheduled workflows alive" || exit 0
          git push
