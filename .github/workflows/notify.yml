name: Daily Notice Check

on:
  schedule:
    # 8 AM KST = 23:00 UTC (previous day)
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare notice state directory
        run: mkdir -p .state

      - name: Restore notice state cache
        id: notice_state_cache_restore
        uses: actions/cache/restore@v4
        with:
          path: .state/
          key: ${{ runner.os }}-notice-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-notice-state-
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      
      - name: Set up Python
        run: uv python install 3.12
      
      - name: Install dependencies
        run: uv sync --frozen
      
      - name: Run notice check
        run: uv run python -m src.main
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_IDS: ${{ secrets.DISCORD_CHANNEL_IDS }}
          CAU_WEBSITE_URL: ${{ secrets.CAU_WEBSITE_URL }}
          CAU_API_URL: ${{ secrets.CAU_API_URL }}
          CAU_LIBRARY_WEBSITE_URL: ${{ secrets.CAU_LIBRARY_WEBSITE_URL }}
          CAU_LIBRARY_API_URL: ${{ secrets.CAU_LIBRARY_API_URL }}
          CAU_SW_NOTICE_URL: ${{ secrets.CAU_SW_NOTICE_URL }}
          CAU_SW_NOTICE_STATE_FILE: .state/sw_last_seen_uid.txt
          DISU_NOTICE_URL: https://www.disu.ac.kr/community/notice
          DISU_NOTICE_STATE_FILE: .state/disu_last_seen_bbsidx.txt

      - name: Save notice state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state/
          key: ${{ runner.os }}-notice-state-${{ github.run_id }}-${{ github.run_attempt }}
